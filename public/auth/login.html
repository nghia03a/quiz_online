<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <div
      class="bg"
      style="background-image: url(/public/assets/img/login.jpg)"
    ></div>
    <div class="overlay"></div>

    <div class="container">
      <div class="card">
        <h1 class="title">ĐĂNG NHẬP</h1>

        <form id="loginForm">
          <div class="field">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="example@gmail.com"
              required
            />
          </div>

          <div class="field">
            <label for="password">Mật khẩu</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              required
            />
          </div>

          <div class="options">
            <label class="remember">
              <input type="checkbox" name="remember" /> Lưu mật khẩu
            </label>
            <a href="#" class="forgot">Quên mật khẩu?</a>
          </div>

          <button type="submit" class="btn-login">Đăng nhập</button>
        </form>

        <p class="register-link">
          Chưa có tài khoản? <a href="register.html">Đăng ký</a>
        </p>
      </div>
    </div>

    <script src="login.js"></script>
  </body>
</html>
